name: Regenerate Screenshots

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg ttyd fontconfig

      - name: Install JetBrainsMono Nerd Font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz" \
            | tar -xJ -C ~/.local/share/fonts
          fc-cache -fv

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Generate screenshots
        run: ./scripts/generate-screenshots.sh

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate screenshots [skip ci]"
          file_pattern: "docs/img/**"
